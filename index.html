<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raymond Rodarte</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e2;
      border-radius: 16px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 480px;
      margin-bottom: 1rem;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 600;
      color: #1e40af;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .tagline {
      font-size: 14px;
      color: #6b6b6b;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #e5e5e2;
      background: #fff;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }

    .link-btn:hover {
      background: #f4f4f1;
      border-color: #ccc;
    }

    .link-btn .icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .icon-blue   { background: #dbeafe; }
    .icon-green  { background: #dcfce7; }
    .icon-purple { background: #ede9fe; }
    .icon-orange { background: #fff7ed; }

    .link-btn .label { flex: 1; }
    .link-btn .arrow { color: #aaa; font-size: 13px; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }

    footer {
      font-size: 12px;
      color: #bbb;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="avatar">RR</div>
    <h1>Raymond Rodarte</h1>
    <p class="tagline">Based in Ventura, CA · Dad · builder of things</p>

    <p class="section-title">Links</p>
    <div class="links">

      <a href="#" class="link-btn">
        <span class="icon icon-blue">💼</span>
        <span class="label">Portfolio</span>
        <span class="arrow">›</span>
      </a>

      <a href="betting.html" class="link-btn">
        <span class="icon icon-purple">🎲</span>
        <span class="label">Family bet pool</span>
        <span class="arrow">›</span>
      </a>

      <a href="https://venmo.com/raymondrodarte" target="_blank" class="link-btn">
        <span class="icon icon-green">💸</span>
        <span class="label">Send me money on Venmo</span>
        <span class="arrow">›</span>
      </a>

      <a href="https://byndwellness.com" target="_blank" class="link-btn">
        <span class="icon icon-orange">🌿</span>
        <span class="label">BYND Wellness</span>
        <span class="arrow">›</span>
      </a>

    </div>
  </div>

  <footer>flowersrodarte.com</footer>

</body>
</html>
